# Sample workflow for building and deploying a VitePress site to GitHub Pages
#
name: Deploy VitePress site to Pages

on:
  # Runs on pushes targeting the `main` branch. Change this to `master` if you're
  # using the `master` branch as the default branch.
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: npm install
      - name: Install PlantUML
        run: |
          wget -q https://github.com/plantuml/plantuml/releases/download/v1.2026.2/plantuml-1.2026.2.jar -O /opt/plantuml.jar
          echo '#!/bin/sh' | sudo tee /usr/local/bin/plantuml
          echo 'exec java -jar /opt/plantuml.jar "$@"' | sudo tee -a /usr/local/bin/plantuml
          sudo chmod +x /usr/local/bin/plantuml
      - name: Generate PlantUML diagrams
        run: |
          find . -name "*.puml" -print0 | while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            (cd "$dir" && plantuml -tsvg "$base")
            echo "Generated: ${f%.puml}.svg"
          done
      - name: Verify SVG output
        run: |
          echo "Generated SVG files:"
          find . -name "*.svg" -path "*/images/*"
          missing=0
          for puml in $(find . -name "*.puml"); do
            svg="${puml%.puml}.svg"
            if [ ! -f "$svg" ]; then
              echo "MISSING: $svg"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then exit 1; fi
      - name: Copy SVGs to public for direct URL access
        run: |
          mkdir -p public/cloud/lambdas/images
          cp cloud/lambdas/images/*.svg public/cloud/lambdas/images/
          mkdir -p public/cloud/github_actions/images
          cp cloud/github_actions/images/*.svg public/cloud/github_actions/images/
      - name: Build with VitePress
        run: npm run docs:build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .vitepress/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
